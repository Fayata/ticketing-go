{{define "admin/kb_category_form"}}
{{template "base" .}}
{{end}}

{{define "admin/kb_category_form_content"}}
<div class="content">
    <div class="card" style="max-width: 500px;">
        <div class="card-header"><h2>Tambah Kategori</h2></div>
        <div class="card-body">
            {{if .error}}<div class="alert alert-error" style="margin-bottom:1rem;">{{.error}}</div>{{end}}
            <form method="post" action="admin/knowledge-base/categories/create/post">
                <div class="form-group" style="margin-bottom:1rem;">
                    <label class="form-label">Nama kategori *</label>
                    <input type="text" name="name" class="form-input" required placeholder="Contoh: Technical Support">
                </div>
                <div class="form-group" style="margin-bottom:1rem;">
                    <label class="form-label">Deskripsi</label>
                    <textarea name="description" class="form-input" rows="2" placeholder="Deskripsi singkat"></textarea>
                </div>
                <div class="form-group" style="margin-bottom:1rem;">
                    <label class="form-label">Icon (emoji)</label>
                    <input type="text" name="icon" class="form-input" placeholder="📄 atau 🖥️">
                </div>
                <div class="form-group" style="margin-bottom:1rem;">
                    <label class="form-label">Kelas warna (green, cyan, indigo, amber, rose, violet)</label>
                    <input type="text" name="color_class" class="form-input" value="green" placeholder="green">
                </div>
                <div style="display:flex; gap:0.75rem;">
                    <button type="submit" class="btn-primary">Simpan</button>
                    <a href="admin/knowledge-base" class="btn-outline-teal" style="text-decoration:none; display:inline-flex; align-items:center;">Batal</a>
                </div>
            </form>
        </div>
    </div>
</div>
{{end}}
