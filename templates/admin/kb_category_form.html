{{define "admin/kb_category_form"}}
{{template "base" .}}
{{end}}

{{define "department_kb_category_form"}}
{{template "department_base" .}}
{{end}}

{{define "admin/kb_category_form_content"}}
<div class="kb-admin">
<div class="content">
    <div class="card kb-admin-form-card">
        <div class="card-header"><h2>Tambah Kategori</h2></div>
        <div class="card-body">
            {{if .error}}<div class="alert alert-error">{{.error}}</div>{{end}}
            <form method="post" action="admin/knowledge-base/categories/create/post" id="kbCategoryForm">
                <div class="form-group">
                    <label class="form-label">Nama kategori *</label>
                    <input type="text" name="name" class="form-input" required placeholder="Contoh: Technical Support">
                </div>
                <div class="form-group">
                    <label class="form-label">Deskripsi</label>
                    <textarea name="description" class="form-input" rows="2" placeholder="Deskripsi singkat"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Icon (emoji)</label>
                    <div class="kb-picker-wrap">
                        <input type="hidden" name="icon" id="kb_icon" value="">
                        <button type="button" class="kb-emoji-trigger form-input" id="emojiTrigger">
                            <span id="emojiPreview" class="kb-emoji-preview">Pilih emoji</span>
                        </button>
                        <div class="kb-emoji-dropdown" id="emojiDropdown" style="display:none;">
                            <div class="kb-emoji-grid" id="emojiGrid"></div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Warna</label>
                    <div class="kb-picker-wrap">
                        <input type="hidden" name="color_class" id="kb_color_class" value="green">
                        <button type="button" class="kb-color-trigger form-input" id="colorTrigger">
                            <span class="kb-color-swatch" id="colorPreview"></span>
                            <span id="colorLabel">green</span>
                        </button>
                        <div class="kb-color-dropdown" id="colorDropdown" style="display:none;">
                            <div class="kb-color-palette" id="colorPalette">
                                <button type="button" class="kb-color-cell" data-class="green" style="background:#d1fae5;" title="green"></button>
                                <button type="button" class="kb-color-cell" data-class="cyan" style="background:#cffafe;" title="cyan"></button>
                                <button type="button" class="kb-color-cell" data-class="indigo" style="background:#e0e7ff;" title="indigo"></button>
                                <button type="button" class="kb-color-cell" data-class="amber" style="background:#fef3c7;" title="amber"></button>
                                <button type="button" class="kb-color-cell" data-class="rose" style="background:#ffe4e6;" title="rose"></button>
                                <button type="button" class="kb-color-cell" data-class="violet" style="background:#ede9fe;" title="violet"></button>
                            </div>
                            <div class="kb-color-sample-wrap">
                                <span class="kb-color-sample-label">Sample</span>
                                <div class="kb-color-sample" id="colorSample"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="kb-form-actions">
                    <button type="submit" class="btn-primary">Simpan</button>
                    <a href="admin/knowledge-base" class="btn-outline-teal">Batal</a>
                </div>
            </form>
        </div>
    </div>
</div>
</div>
<script>
(function(){
    var emojis = ['ΏθΥΕ','ΏθΥΒ','ΏθΨξΎ╕Π','έγβΎ╕Π','ΏθΦπ','ΏθΥΜ','ΏθΥΝ','ΏθΥΟ','ΏθΥΓ','ΏθΤκ','ΏθΦΦ','ΏθΥλ','ΏθΥΨ','ΏθΥγ','ΏθΟψ','έεΖ','έζΥ','έζΩ','ΏθΦΤ','ΏθΦΥ','ΏθΥπ','ΏθΥη','ΏθΝΡ','ΏθΤυ','ΏθΣν','ΏθΣξ','ΏθΠλ','ΏθΥΛ','ΏθΥΙ','ΏθΥΚ','ΏθδιΎ╕Π','ΏθΦρ','έγκ','ΏθΦξ','έφΡ','έζνΎ╕Π','ΏθΤγ','ΏθΤβ','ΏθΥζ','έεΠΎ╕Π','ΏθΩΓΎ╕Π','ΏθΥΣ','ΏθΦΨ','ΏθΥΝ','ΏθΟρ','ΏθΨ╝Ύ╕Π','ΏθΥ╖','ΏθΥ╣','ΏθΦΞ','ΏθΥΝ','ΏθΠ╖Ύ╕Π','ΏθΥο','ΏθΥν','ΏθΥξ','ΏθΤ╛','ΏθΩΔΎ╕Π','ΏθΥΓ','ΏθΥΖ','έΠ░','ΏθΦΦ','έεΦΎ╕Π','έηκΎ╕Π','ΏθΥΝ','ΏθΦΩ'];
    var colorMap = { green:'#d1fae5', cyan:'#cffafe', indigo:'#e0e7ff', amber:'#fef3c7', rose:'#ffe4e6', violet:'#ede9fe' };
    var iconInput = document.getElementById('kb_icon');
    var emojiPreview = document.getElementById('emojiPreview');
    var emojiTrigger = document.getElementById('emojiTrigger');
    var emojiDropdown = document.getElementById('emojiDropdown');
    var colorInput = document.getElementById('kb_color_class');
    var colorPreview = document.getElementById('colorPreview');
    var colorLabel = document.getElementById('colorLabel');
    var colorSample = document.getElementById('colorSample');
    var colorTrigger = document.getElementById('colorTrigger');
    var colorDropdown = document.getElementById('colorDropdown');

    var grid = document.getElementById('emojiGrid');
    emojis.forEach(function(e){
        var btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'kb-emoji-cell'; btn.textContent = e;
        btn.addEventListener('click', function(){ iconInput.value = e; emojiPreview.textContent = e; emojiDropdown.style.display = 'none'; });
        grid.appendChild(btn);
    });

    emojiTrigger.addEventListener('click', function(ev){ ev.preventDefault(); colorDropdown.style.display = 'none'; emojiDropdown.style.display = emojiDropdown.style.display === 'none' ? 'block' : 'none'; });
    colorTrigger.addEventListener('click', function(ev){ ev.preventDefault(); emojiDropdown.style.display = 'none'; colorDropdown.style.display = colorDropdown.style.display === 'none' ? 'block' : 'none'; });

    function setColor(cls) {
        colorInput.value = cls;
        colorPreview.style.background = colorMap[cls] || colorMap.green;
        colorLabel.textContent = cls;
        colorSample.style.background = colorMap[cls] || colorMap.green;
        document.querySelectorAll('.kb-color-cell').forEach(function(el){ el.classList.toggle('selected', el.getAttribute('data-class') === cls); });
    }
    setColor('green');
    document.querySelectorAll('.kb-color-cell').forEach(function(el){
        el.addEventListener('click', function(){ setColor(el.getAttribute('data-class')); colorDropdown.style.display = 'none'; });
    });

    document.addEventListener('click', function(ev){
        if (!ev.target.closest('.kb-picker-wrap')) { emojiDropdown.style.display = 'none'; colorDropdown.style.display = 'none'; }
    });
})();
</script>
{{end}}
