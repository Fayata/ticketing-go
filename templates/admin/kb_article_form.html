{{define "admin/kb_article_form"}}
{{template "base" .}}
{{end}}

{{define "department_kb_article_form"}}
{{template "department_base" .}}
{{end}}

{{define "admin/kb_article_form_content"}}
<div class="kb-admin">
<div class="content">
    <div class="card kb-admin-form-card kb-admin-form-card--wide">
        <div class="card-header"><h2>Tambah Artikel</h2></div>
        <div class="card-body">
            {{if .error}}<div class="alert alert-error">{{.error}}</div>{{end}}
            <form method="post" action="admin/knowledge-base/articles/create/post">
                <div class="form-group">
                    <label class="form-label">Judul *</label>
                    <input type="text" name="title" class="form-input" required placeholder="Judul artikel">
                </div>
                <div class="form-group">
                    <label class="form-label">Kategori *</label>
                    <select name="category_id" class="form-input" required>
                        <option value="">-- Pilih kategori --</option>
                        {{range .categories}}
                        <option value="{{.ID}}">{{.Name}}</option>
                        {{end}}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Isi (teks atau HTML)</label>
                    <textarea name="content" class="form-input" rows="12" placeholder="Konten artikel..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Estimasi baca (menit)</label>
                    <input type="number" name="read_time_minutes" class="form-input" value="5" min="0">
                </div>
                <div class="kb-form-actions">
                    <button type="submit" class="btn-primary">Simpan</button>
                    <a href="admin/knowledge-base" class="btn-outline-teal">Batal</a>
                </div>
            </form>
        </div>
    </div>
</div>
</div>
{{end}}
