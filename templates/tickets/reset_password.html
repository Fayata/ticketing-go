<!DOCTYPE html>
<html lang="id">

<head>
    <base href="/Ticketing/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Baru - Portal Ticketing</title>
    <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/login.css">
    <link rel="stylesheet" href="static/css/pages.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
                <h1 class="login-title">Password Baru</h1>
                <p class="login-subtitle">Masukkan password baru Anda.</p>
            </div>

            {{if .error}}
            <div class="alert-container">
                <div class="alert alert-error"><span>{{.error}}</span></div>
            </div>
            {{end}}

            <form method="post" action="reset-password" class="login-form">
                <input type="hidden" name="token" value="{{.token}}">

                <div class="form-group">
                    <label class="form-label">Password Baru</label>
                    <input type="password" name="password" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Konfirmasi Password</label>
                    <input type="password" name="confirm_password" class="form-input" required>
                </div>

                <button type="submit" class="login-button"><span class="button-text">Simpan Password</span></button>
            </form>
        </div>
    </div>
    <script src="static/js/login.js"></script>
</body>

</html>
