<!DOCTYPE html>
<html lang="id">

<head>
    <base href="/Ticketing/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Portal Ticketing</title>
    <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/login.css">
    <link rel="stylesheet" href="static/pages.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
                <h1 class="login-title">Reset Password</h1>
                <p class="login-subtitle">Masukkan email Anda untuk menerima link reset.</p>
            </div>

            {{if .success}}
            <div class="alert-container">
                <div class="alert alert-success"><span>{{.success}}</span></div>
            </div>
            {{end}}

            <form method="post" action="forgot-password" class="login-form">
                <div class="form-group">
                    <label for="email" class="form-label">Email Terdaftar</label>
                    <input type="email" name="email" id="email" class="form-input" required>
                </div>
                <button type="submit" class="login-button"><span class="button-text">Kirim Link</span></button>
            </form>

            <div class="login-footer">
                <p class="footer-text">Kembali ke <a href="login" class="footer-link">Login</a></p>
            </div>
        </div>
    </div>
    <script src="static/login.js"></script>
</body>

</html>
